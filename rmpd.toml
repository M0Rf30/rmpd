# rmpd configuration file

[general]
music_directory = "/home/gianluca/Musica"
playlist_directory = "/home/gianluca/.config/rmpd/playlists"
db_file = "/home/gianluca/.config/rmpd/database.db"
state_file = "/home/gianluca/.config/rmpd/state"
log_level = "debug"
follow_symlinks = false
filesystem_charset = "UTF-8"

[network]
bind_address = "127.0.0.1"
port = 6600
max_connections = 100
connection_timeout = 60
# Advertise rmpd on the session D-Bus via MPRIS (org.mpris.MediaPlayer2.rmpd)
# so desktop environments, playerctl, and media keys can detect and control it.
mpris = true

[audio]
default_output = "default"
buffer_time = 500
# Sample-rate conversion quality, used only when the output device cannot play a
# stream's native rate. One of: sinc_best, sinc_medium, sinc_fast, linear.
resampler_quality = "sinc_medium"
# DSD over PCM (DoP) for DSD files. "no" = always convert to PCM (default,
# works on any DAC); "yes" = always send native DSD via DoP (needs a DoP DAC on
# a bit-perfect path — set `device` below); "auto" = DoP only when `device` is
# set. The RMPD_DOP env var overrides this.
dop = "no"
# Output device id (ALSA PCM name). Empty/unset = system default (PipeWire).
# Set a raw `hw:` device for bit-perfect DoP, bypassing PipeWire's resampling.
# Discover ids with: cargo run -p rmpd-player --example list_devices
# (or set RMPD_LIST_DEVICES=1). The RMPD_AUDIO_DEVICE env var overrides this.
# device = "hw:CARD=1,DEV=0"
replay_gain = "off"
replay_gain_preamp = 0.0
replay_gain_missing_preamp = 0.0
volume_normalization = false
gapless = true
crossfade = 0
mixramp_db = -17.0
mixramp_delay = 0.0

[[output]]
name = "Default Output"
type = "default"
enabled = true
# MPD-style per-output settings are also honored (used when [audio].dop/device
# are unset), e.g. a dedicated DAC for bit-perfect DoP:
# [[output]]
# name = "Fosi DS2"
# type = "alsa"
# enabled = true
# device = "hw:CARD=1,DEV=0"
# dop = "yes"

[decoder]
enabled = ["symphonia"]

[database]
auto_update = true
filesystem_watch = true
cache_size = 64
fts_enabled = true

# ── Music Sources ────────────────────────────────────────────────────────────
# Remote catalogs are declared as [[source]] blocks. Each enabled source is
# synced into rmpd's SQLite index under a virtual path of the form
# <type>://<name>/<Artist>/<Album>/<remote-id>.
#
# Example: OpenSubsonic-compatible server (Navidrome, Jellyfin, Airsonic …)
# Uncomment and fill in your server details to activate.
#
# [[source]]
# name = "home"           # arbitrary label; becomes the authority in virtual paths
# type = "subsonic"       # backend type; "subsonic" requires the subsonic feature
# enabled = false         # set to true to activate
# url = "https://music.example.com"
# username = "alice"
# password = "s3cr3t"
# # Optional: cap streaming bitrate (kbps). 0 or absent = server default.
# # max_bitrate = 320
# # Optional: preferred transcoding format ("raw" = original, "mp3", "opus", …).
# # format = "raw"
