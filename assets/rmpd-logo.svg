<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 562 200" width="562" height="200" role="img" aria-label="rmpd — music player daemon">
  <title>rmpd — music player daemon</title>
  <defs>
    <linearGradient id="rmpdBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="0.55" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="rmpdInk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="rmpdGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="rmpdShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#e11d48" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Icon badge: an audio waveform = "music", in a rounded app-style tile -->
  <g filter="url(#rmpdShadow)">
    <rect x="24" y="24" width="152" height="152" rx="36" fill="url(#rmpdBadge)"/>
    <rect x="24" y="24" width="152" height="152" rx="36" fill="url(#rmpdGloss)"/>
  </g>
  <g fill="#ffffff">
    <rect x="45"  y="82" width="8" height="36"  rx="4"/>
    <rect x="62"  y="70" width="8" height="60"  rx="4"/>
    <rect x="79"  y="56" width="8" height="88"  rx="4"/>
    <rect x="96"  y="48" width="8" height="104" rx="4"/>
    <rect x="113" y="56" width="8" height="88"  rx="4"/>
    <rect x="130" y="70" width="8" height="60"  rx="4"/>
    <rect x="147" y="82" width="8" height="36"  rx="4"/>
  </g>

  <!-- Wordmark -->
  <text x="208" y="124" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif"
        font-size="104" font-weight="700" letter-spacing="-2" fill="url(#rmpdInk)">rmpd</text>
  <text x="212" y="162" font-family="'DejaVu Sans','Helvetica Neue',Arial,sans-serif"
        font-size="22" font-weight="500" letter-spacing="4" fill="#94a3b8">MUSIC PLAYER DAEMON</text>
</svg>
